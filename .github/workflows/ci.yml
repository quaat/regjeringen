name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check . --no-cache

      - name: Mypy
        run: python -m mypy src/sculpin_regjeringen

      - name: Pytest
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest -p no:cacheprovider
